<html lang="te">
<head>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', 'Lohit Telugu', 'Noto Sans Telugu', sans-serif;
    }

    body {
      background-color: #f5f3f0;
      color: #1e1e1e;
    }

    .mw-site {
      max-width: 1300px;
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 25px rgba(0,0,0,0.05);
      min-height: 100vh;
    }

    /* Header */
    .mw-header {
      background: linear-gradient(145deg, #8b1e1e 0%, #b1452b 100%);
      padding: 1.8rem 1.5rem 1rem 1.5rem;
      color: white;
      border-bottom: 5px solid #fbc02d;
    }

    .mw-header-top {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
    }

    .mw-logo h1 {
      font-size: 3.2rem;
      font-weight: 700;
      line-height: 1.1;
      text-shadow: 4px 4px 0 #572222;
    }

    .mw-logo p {
      font-size: 1.2rem;
      margin-left: 8px;
      font-style: italic;
    }

    .mw-quote {
      background: rgba(255,255,240,0.18);
      backdrop-filter: blur(2px);
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-size: 1.4rem;
      border: 1px solid #fbc02d;
    }

    /* Navigation */
    .mw-nav {
      background: #2c130b;
      padding: 0.7rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: center;
      border-bottom: 2px solid #f3b33d;
    }

    .mw-nav a {
      color: #f5e2c1;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.15rem;
      padding: 0.2rem 0;
      border-bottom: 2px solid transparent;
    }

    .mw-nav a:hover {
      color: #fbc02d;
      border-bottom-color: #fbc02d;
    }

    /* Social Strip */
    .mw-social-strip {
      background: #faead3;
      padding: 0.5rem 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #dbb68c;
    }

    .mw-social-strip span {
      color: #5f3e2c;
    }

    .mw-social-strip a {
      color: #5f3e2c;
      font-size: 1.5rem;
      margin-right: 1.2rem;
    }

    .mw-main {
      padding: 2rem 1.5rem;
      background: #fefcf7;
    }

    .section-head {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
      border-left: 8px solid #b1452b;
      padding-left: 1.2rem;
    }

    .section-head h2 {
      font-size: 2rem;
      color: #2a1b13;
    }

    /* News Grid */
    .mw-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem 1.5rem;
    }

    .news-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: transform 0.2s;
      border: 1px solid #f0e0d0;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .news-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 30px rgba(181, 76, 36, 0.15);
      border-color: #c1663b;
    }

    .card-thumb {
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 10px;
    }

    .card-quote-overlay {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
      color: #ffefd5;
      padding: 0.6rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid #f5b87e;
    }

    .card-content {
      padding: 1.3rem 1.2rem 1.5rem 1.2rem;
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #2c1b10;
    }

    .card-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
      color: #9e7b62;
      margin-bottom: 1rem;
    }

    .card-excerpt {
      color: #4f3e32;
      line-height: 1.6;
      margin-bottom: 1.2rem;
      border-left: 2px solid #fac364;
      padding-left: 0.9rem;
    }

    .read-more {
      display: inline-block;
      color: #b1452b;
      font-weight: 600;
      border-bottom: 2px dotted #d6936b;
      text-decoration: none;
    }

    .read-more i {
      transition: 0.2s;
      margin-left: 5px;
    }

    .read-more:hover i {
      transform: translateX(5px);
    }

    /* Article Page Styles */
    .article-page {
      padding: 2rem 1.5rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .back-button {
      display: inline-block;
      margin-bottom: 2rem;
      color: #b1452b;
      text-decoration: none;
      font-size: 1.1rem;
    }

    .back-button i {
      margin-right: 8px;
    }

    .article-title {
      font-size: 2.5rem;
      color: #2c1b10;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .article-meta {
      display: flex;
      gap: 2rem;
      color: #9e7b62;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #faead3;
    }

    .article-image {
      width: 100%;
      height: 400px;
      background-size: cover;
      background-position: center;
      border-radius: 20px;
      margin-bottom: 2rem;
    }

    .article-content {
      font-size: 1.2rem;
      line-height: 1.8;
      color: #2c1b10;
    }

    .article-content p {
      margin-bottom: 1.5rem;
    }

    .article-quote {
      background: #faead3;
      padding: 2rem;
      border-radius: 20px;
      margin: 2rem 0;
      font-style: italic;
      font-size: 1.3rem;
      color: #8b1e1e;
      text-align: center;
    }

    /* Footer */
    .mw-footer {
      background: #25170f;
      color: #dac2ad;
      padding: 2rem 1.5rem 1.5rem;
      border-top: 6px solid #b96b46;
    }

    .footer-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo span {
      font-size: 2rem;
      font-weight: 700;
      color: #f5cba1;
    }

    .footer-social a {
      color: #f5cba1;
      font-size: 1.7rem;
      margin-left: 15px;
    }

    /* Pagination */
    .mw-pagination {
      display: flex;
      justify-content: center;
      margin-top: 3rem;
    }

    .pagination-btn {
      background: #fae6d8;
      border: 1px solid #cb8e69;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      color: #732f15;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
    }

    .pagination-btn:hover {
      background: #b96b46;
      color: white;
    }

    @media (max-width: 700px) {
      .mw-logo h1 { font-size: 2.4rem; }
      .article-title { font-size: 1.8rem; }
      .article-image { height: 250px; }
    }
  </style>
</head>

  // Router function
  function handleNavigation() {
    const urlParams = new URLSearchParams(window.location.search);
    const page = urlParams.get('page') || 'home';
    const newsId = urlParams.get('id');
    const category = urlParams.get('cat');
    
    let html = '';
    
    if (page === 'article' && newsId && newsData[newsId]) {
      // Show article page
      const article = newsData[newsId];
      html = `
        <div class="article-page">
          <a href="?page=home" class="back-button">
            <i class="fas fa-arrow-left"></i> తిరిగి వార్తలకు
          </a>
          <h1 class="article-title">${article.title}</h1>
          <div class="article-meta">
            <span><i class="far fa-clock"></i> ${article.date}</span>
            <span><i class="fas fa-user"></i> ${article.author}</span>
            <span><i class="fas fa-folder"></i> ${article.category}</span>
          </div>
          <div class="article-image" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.1)), url('${article.image}');"></div>
          <div class="article-content">
            ${article.content}
          </div>
        </div>
      `;

      // Show category page
      const filteredNews = Object.values(newsData).filter(n => n.category === category);
      html = `

          <div class="section-head">
            <i class="fas fa-filter"></i>
            <h2>${category} వార్తలు</h2>
          </div>
          <div class="mw-grid">

              <a href="?page=article&id=${news.id}" class="news-card">
                <div class="card-thumb" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('${news.image.replace('800', '400').replace('400', '200')}');">
                  <div class="card-quote-overlay"><i class="fas fa-quote-right"></i> తాజా వార్త</div>
                </div>
                <div class="card-content">
                  <div class="card-title">${news.title}</div>
                  <div class="card-meta"><i class="far fa-clock"></i> ${news.date} · <i class="fas fa-user"></i> ${news.author}</div>
                  <div class="card-excerpt">${news.excerpt}</div>
                  <span class="read-more">పూర్తి కథనం <i class="fas fa-arrow-right"></i></span>
                </div>
              </a>
            `).join('')}
          </div>
        </div>
      `;
    } else {
      // Show home page with all news
      html = `
        <div class="mw-main">
          <div class="section-head">
            <i class="fas fa-newspaper"></i>
            <h2>ఈరోజు హైలైట్స్</h2>
          </div>
          <div class="mw-grid">
            ${Object.values(newsData).map(news => `
              <a href="?page=article&id=${news.id}" class="news-card">
                <div class="card-thumb" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('${news.image.replace('800', '400').replace('400', '200')}');">
                  <div class="card-quote-overlay"><i class="fas fa-quote-right"></i> తాజా వార్త</div>
                </div>
                <div class="card-content">
                  <div class="card-title">${news.title}</div>
                  <div class="card-meta"><i class="far fa-clock"></i> ${news.date} · <i class="fas fa-user"></i> ${news.author}</div>
                  <div class="card-excerpt">${news.excerpt}</div>
                  <span class="read-more">పూర్తి కథనం <i class="fas fa-arrow-right"></i></span>
                </div>
              </a>
            `).join('')}
          </div>
          <div class="mw-pagination">
            <div class="pagination-btn" onclick="loadMoreNews()">
              <i class="fas fa-sync-alt"></i> మరిన్ని కథనాలు
            </div>
          </div>
        </div>
      `;
    }
    
    document.getElementById('content-area').innerHTML = html;
  }

  // Load more function
  function loadMoreNews() {
    alert("మరిన్ని కథనాలు లోడ్ అవుతున్నాయి... (డెమో కోసం ఇది డమ్మీ ఫంక్షన్)");
  }

  // Handle back/forward buttons
  window.addEventListener('popstate', handleNavigation);

  // Handle all navigation links
  document.addEventListener('click', function(e) {
    if (e.target.closest('a')) {
      const link = e.target.closest('a');
      const href = link.getAttribute('href');
      
      // Only handle internal links that start with ?page=
      if (href && href.startsWith('?page=')) {
        e.preventDefault();
        history.pushState({}, '', href);
        handleNavigation();
      }
    }
  });

  // Initial load
  handleNavigation();
</script>
</body>
</html>
