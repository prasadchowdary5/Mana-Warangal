  // Generate last 7 days dates
  function generateLast7Days() {
    const dates = [];
    const today = new Date('2026-03-06'); // Using current date from your original
    
    for (let i = 6; i >= 0; i--) {
      const date = new Date(today);
      date.setDate(today.getDate() - i);
      
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const dateStr = `${year}-${month}-${day}`;
      
      const teluguMonths = ['జన', 'ఫిబ్ర', 'మార్చి', 'ఏప్రి', 'మే', 'జూన్', 'జులై', 'ఆగ', 'సెప్టెం', 'అక్టో', 'నవం', 'డిసెం'];
      
      dates.push({
        dateStr: dateStr,
        day: date.getDate(),
        month: teluguMonths[date.getMonth()],
        hasNews: newsDatabase[dateStr] ? true : false,
        fullDate: date
      });
    }
    return dates;
  }

  // Render Calendar
  function renderCalendar(selectedDate = '2026-03-06') {
    const dates = generateLast7Days();
    const calendarHtml = dates.map(d => `
      <div class="date-item ${d.dateStr === selectedDate ? 'active' : ''} ${d.hasNews ? '' : 'opacity-50'}" 
           onclick="navigateToDate('${d.dateStr}')">
        <div class="day">${d.day}</div>
        <div class="month">${d.month}</div>
        ${d.hasNews ? '<i class="fas fa-circle" style="font-size: 6px; color: #b1452b; margin-top: 4px;"></i>' : ''}
      </div>
    `).join('');
    
    document.getElementById('calendarDates').innerHTML = calendarHtml;
  }

    history.pushState({}, '', `?page=date&date=${dateStr}`);
    handleNavigation();
    renderCalendar(dateStr);
  }

    const date = new Date(dateStr + 'T12:00:00');
    const teluguMonths = ['జనవరి', 'ఫిబ్రవరి', 'మార్చి', 'ఏప్రిల్', 'మే', 'జూన్', 'జులై', 'ఆగస్టు', 'సెప్టెంబర్', 'అక్టోబర్', 'నవంబర్', 'డిసెంబర్'];
    const teluguWeekdays = ['ఆదివారం', 'సోమవారం', 'మంగళవారం', 'బుధవారం', 'గురువారం', 'శుక్రవారం', 'శనివారం'];
    
    return {
      date: date.getDate(),
      month: teluguMonths[date.getMonth()],
      year: date.getFullYear(),
      weekday: teluguWeekdays[date.getDay()]
    };
  }

  // Load More News function
  function loadMoreNews() {
    alert("మరిన్ని పాత వార్తల కోసం క్యాలెండర్ ను ఉపయోగించండి. (డెమో కోసం ఇది డమ్మీ ఫంక్షన్)");
  }

  // Router function
  function handleNavigation() {
    const urlParams = new URLSearchParams(window.location.search);
    const page = urlParams.get('page') || 'home';
    const newsId = urlParams.get('id');
    const category = urlParams.get('cat');
    const date = urlParams.get('date') || '2026-03-06';
    
    let html = '';
    
    // Article page
    if (page === 'article' && newsId) {
      // Find article across all dates
      let article = null;
      for (let d in newsDatabase) {
        const found = newsDatabase[d].find(a => a.id === newsId);
        if (found) {
          article = found;
          article.fullDate = d;
          break;
        }
      }
      
      if (article) {
        const teluguDate = formatDateTelugu(article.fullDate);
        html = `
          <div class="article-page">
            <a href="?page=date&date=${article.fullDate}" class="back-button">
              <i class="fas fa-arrow-left"></i> తిరిగి ${teluguDate.date} ${teluguDate.month} వార్తలకు
            </a>
            <h1 class="article-title">${article.title}</h1>
            <div class="article-meta">
              <span><i class="far fa-calendar"></i> ${teluguDate.weekday}, ${teluguDate.date} ${teluguDate.month} ${teluguDate.year}</span>
              <span><i class="fas fa-user"></i> ${article.author}</span>
              <span><i class="fas fa-tag"></i> ${article.category}</span>
            </div>
            <div class="article-image" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.1)), url('${article.image}');"></div>
            <div class="article-content">
              ${article.content}
            </div>
          </div>
        `;
      }
    }
    // Category page
    else if (page === 'category' && category) {
      const allNews = [];
      for (let d in newsDatabase) {
        newsDatabase[d].forEach(news => {
          if (news.category === category) {
            allNews.push({...news, fullDate: d});
          }
        });
      }
      
      if (allNews.length > 0) {
        html = `
          <div class="mw-main">
            <div class="section-head">
              <i class="fas fa-filter"></i>
              <h2>${category} వార్తలు</h2>
            </div>
            <div class="mw-grid">
              ${allNews.map(news => {
                const teluguDate = formatDateTelugu(news.fullDate);
                return `
                  <a href="?page=article&id=${news.id}" class="news-card">
                    <div class="card-thumb" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('${news.image.replace('800', '400')}');">
                      <div class="card-quote-overlay"><i class="fas fa-quote-right"></i> ${teluguDate.date} ${teluguDate.month}</div>
                    </div>
                    <div class="card-content">
                      <div class="card-title">${news.title}</div>
                      <div class="card-meta">
                        <span><i class="far fa-clock"></i> ${news.time}</span>
                        <span><i class="fas fa-user"></i> ${news.author}</span>
                      </div>
                      <div class="card-excerpt">${news.excerpt}</div>
                      <span class="read-more">పూర్తి కథనం <i class="fas fa-arrow-right"></i></span>
                    </div>
                  </a>
                `}).join('')}
            </div>
          </div>
        `;
      }
    }
    // Date page
    else if (page === 'date' && date) {
      const newsForDate = newsDatabase[date] || [];
      const teluguDate = formatDateTelugu(date);
      
      if (newsForDate.length > 0) {
        html = `
          <div class="mw-main">
            <div class="selected-date-badge">
              <i class="far fa-calendar-alt"></i> ${teluguDate.weekday}, ${teluguDate.date} ${teluguDate.month} ${teluguDate.year}
            </div>
            <div class="mw-grid">
              ${newsForDate.map(news => `
                <a href="?page=article&id=${news.id}" class="news-card">
                  <div class="card-thumb" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('${news.image.replace('800', '400')}');">
                    <div class="card-quote-overlay"><i class="fas fa-quote-right"></i> తాజా వార్త</div>
                  </div>
                  <div class="card-content">
                    <div class="card-title">${news.title}</div>
                    <div class="card-meta">
                      <span><i class="far fa-clock"></i> ${news.time}</span>
                      <span><i class="fas fa-user"></i> ${news.author}</span>
                    </div>
                    <div class="card-excerpt">${news.excerpt}</div>
                    <span class="read-more">పూర్తి కథనం <i class="fas fa-arrow-right"></i></span>
                  </div>
                </a>
              `).join('')}
            </div>
          </div>
        `;
      } else {
        html = `
          <div class="mw-main">
            <div class="selected-date-badge">
              <i class="far fa-calendar-alt"></i> ${teluguDate.date} ${teluguDate.month} ${teluguDate.year}
            </div>
            <div class="no-news">
              <i class="far fa-frown fa-3x"></i>
              <h3>ఈ రోజు వార్తలు లేవు</h3>
              <p>దయచేసి మరొక తేదీని ఎంచుకోండి</p>
            </div>
          </div>
        `;
      }
    }
    // Home page
    else {
      const latestDate = '2026-03-06';
      const latestNews = newsDatabase[latestDate] || [];
      const teluguDate = formatDateTelugu(latestDate);
      
      html = `
        <div class="mw-main">
          <div class="section-head">
            <i class="fas fa-newspaper"></i>
            <h2>ఈరోజు హైలైట్స్ - ${teluguDate.date} ${teluguDate.month}</h2>
          </div>
          <div class="mw-grid">
            ${latestNews.map(news => `
              <a href="?page=article&id=${news.id}" class="news-card">
                <div class="card-thumb" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('${news.image.replace('800', '400')}');">
                  <div class="card-quote-overlay"><i class="fas fa-quote-right"></i> తాజా వార్త</div>
                </div>
                <div class="card-content">
                  <div class="card-title">${news.title}</div>
                  <div class="card-meta">
                    <span><i class="far fa-clock"></i> ${news.time}</span>
                    <span><i class="fas fa-user"></i> ${news.author}</span>
                  </div>
                  <div class="card-excerpt">${news.excerpt}</div>
                  <span class="read-more">పూర్తి కథనం <i class="fas fa-arrow-right"></i></span>
                </div>
              </a>
            `).join('')}
          </div>
          
          <div class="section-head" style="margin-top: 3rem;">
            <i class="fas fa-history"></i>
            <h2>గత వార్తలు</h2>
          </div>
          
          <div class="mw-grid">
            ${Object.entries(newsDatabase).filter(([d]) => d !== latestDate).slice(0, 3).map(([date, newsList]) => {
              const teluguDate = formatDateTelugu(date);
              const firstNews = newsList[0];
              return `
                <a href="?page=date&date=${date}" class="news-card">
                  <div class="card-thumb" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.6), rgba(0,0,0,0.3)), url('${firstNews.image.replace('800', '400')}');">
                    <div class="card-quote-overlay"><i class="fas fa-calendar"></i> ${teluguDate.date} ${teluguDate.month}</div>
                  </div>
                  <div class="card-content">
                    <div class="card-title">${teluguDate.weekday} వార్తలు</div>
                    <div class="card-meta">${newsList.length} వార్తలు</div>
                    <div class="card-excerpt">${newsList.map(n => n.title.substring(0, 30)).join(' • ')}...</div>
                    <span class="read-more">చూడండి <i class="fas fa-arrow-right"></i></span>
                  </div>
                </a>
              `}).join('')}
          </div>
          
          <div class="mw-pagination">
            <div class="pagination-btn" onclick="loadMoreNews()">
              <i class="fas fa-calendar-alt"></i> పాత వార్తల కోసం క్యాలెండర్ ఉపయోగించండి
            </div>
          </div>
        </div>
      `;
    }
    
    document.getElementById('content-area').innerHTML = html;
  }

  // Event Listeners
  window.addEventListener('popstate', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const selectedDate = urlParams.get('date') || '2026-03-06';
    renderCalendar(selectedDate);
    handleNavigation();
  });

  document.addEventListener('click', function(e) {
    if (e.target.closest('a')) {
      const link = e.target.closest('a');
      const href = link.getAttribute('href');
      
      if (href && href.startsWith('?')) {
        e.preventDefault();
        history.pushState({}, '', href);
        
        const urlParams = new URLSearchParams(href.substring(1));
        const selectedDate = urlParams.get('date') || '2026-03-06';
        renderCalendar(selectedDate);
        handleNavigation();
      }
    }
  });

  // Initialize
  renderCalendar('2026-03-06');
  handleNavigation();
</script>
</body>
</html>
